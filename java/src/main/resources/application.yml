server:
  port: 8080

spring:
  datasource:
    url: 
    username: 
    password:
    driver-class-name: org.postgresql.Driver

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 3000ms

app:
  tables:
    names:
      - employee
      - company
      - position
      - department
      - system_user

  queue:
    max-size-per-table: 1000
    flush-interval-ms: 300000

  cache:
    key-prefix: appcache
    searchable-fields:
      employee:
        - code
        - name
        - phone
      company:
        - name
      position:
        - name
      department:
        - name
      system_user:
        - name

logging:
  level:
    root: INFO